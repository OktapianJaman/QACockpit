<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QA Cockpit</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="brand">QA Cockpit</span>
      </div>
      <div class="topbar-right">
        <button id="sync-btn" class="btn" title="Tarik data Jira & GitHub">Sync</button>
        <button id="refresh-btn" class="btn" title="Muat ulang board">Refresh</button>
        <button id="gear-btn" class="btn icon-btn" title="Pengaturan">⚙</button>
      </div>
    </header>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <main class="content">
      <div class="board-toolbar">
        <input id="board-search" class="board-search" placeholder="Cari kode / judul…" />
      </div>
      <div id="board" class="board-wrap"></div>
      <div id="board-empty" class="board-empty hidden">
        Belum ada tiket. Klik Sync buat narik dari Jira.
      </div>
    </main>

    <!-- Ticket detail modal: summary + status + test-case management -->
    <div id="detail-overlay" class="overlay hidden">
      <div class="detail-panel card">
        <div class="card-head">
          <h2 id="detail-key" class="mono">—</h2>
          <button id="detail-close" class="btn icon-btn" title="Tutup">✕</button>
        </div>
        <p id="detail-summary" class="detail-summary"></p>
        <div class="detail-status-row">
          <span id="detail-status" class="status-chip"></span>
          <button id="detail-shift" class="btn small">Geser status</button>
        </div>

        <div class="detail-tabs">
          <button id="tab-testcases" class="detail-tab active" data-tab="testcases">Test Cases</button>
          <button id="tab-pr" class="detail-tab" data-tab="pr">PR</button>
        </div>

        <div id="panel-testcases" class="tab-panel">
          <div class="tc-section">
            <div class="tc-head">
              <h2>Test Cases</h2>
              <span id="tc-counter" class="tc-counter"></span>
            </div>
            <div class="tc-actions">
              <button id="tc-generate" class="btn small primary">✨ Generate pakai AI</button>
              <button id="tc-add-toggle" class="btn small">+ Tambah manual</button>
            </div>

            <form id="tc-add-form" class="tc-add-form hidden">
              <input type="text" id="tc-title" placeholder="Judul test case (wajib)" />
              <input type="text" id="tc-steps" placeholder="Langkah (opsional)" />
              <input type="text" id="tc-expected" placeholder="Hasil yang diharapkan (opsional)" />
              <div class="tc-add-actions">
                <button type="button" id="tc-add-cancel" class="btn small">Batal</button>
                <button type="submit" class="btn small primary">Simpan</button>
              </div>
            </form>

            <div id="tc-list" class="tc-list"></div>
            <div id="tc-empty" class="tc-empty hidden">Belum ada test case. Generate pakai AI atau tambah manual.</div>
          </div>
        </div>

        <div id="panel-pr" class="tab-panel hidden">
          <div class="pr-section">
            <div class="pr-manual">
              <input id="pr-link" class="pr-link-input" type="text"
                placeholder="Tempel link PR GitHub (https://github.com/owner/repo/pull/123)" />
              <button id="pr-link-go" class="btn small primary">✨ Ringkas link ini</button>
            </div>
            <div class="pr-or">— atau —</div>
            <div class="pr-actions">
              <button id="pr-search" class="btn small">🔍 Cari otomatis dari kode tiket</button>
            </div>
            <div id="pr-list" class="pr-list"></div>
            <div id="pr-empty" class="pr-empty">Tempel link PR di atas, atau coba cari otomatis.</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Pick-transition modal: lists available Jira transitions as buttons -->
    <div id="transition-overlay" class="overlay hidden">
      <div class="confirm-panel card">
        <div class="card-head">
          <h2 id="transition-title">Geser status</h2>
          <button id="transition-close" class="btn icon-btn" title="Tutup">✕</button>
        </div>
        <div id="transition-list" class="transition-list"></div>
      </div>
    </div>

    <!-- Generic confirm modal (used before any write to Jira) -->
    <div id="confirm-overlay" class="overlay hidden">
      <div class="confirm-panel card">
        <p id="confirm-msg"></p>
        <div class="confirm-actions">
          <button id="confirm-cancel" class="btn">Batal</button>
          <button id="confirm-ok" class="btn primary">Ya, lanjut</button>
        </div>
      </div>
    </div>

    <!-- Settings panel -->
    <div id="settings-overlay" class="overlay hidden">
      <div class="settings-panel card">
        <div class="card-head">
          <h2>Pengaturan</h2>
          <button id="settings-close" class="btn icon-btn" title="Tutup">✕</button>
        </div>
        <form id="settings-form" class="settings-form">
          <label>Jira Base URL
            <input type="text" id="cfg-jira_base_url" placeholder="https://company.atlassian.net" />
          </label>
          <label>Jira Email
            <input type="text" id="cfg-jira_email" placeholder="kamu@company.com" />
          </label>
          <label>Jira API Token
            <input type="password" id="cfg-jira_token" placeholder="••••••••" />
          </label>
          <div class="jira-load-row">
            <button type="button" id="jira-load-btn" class="btn small">Muat dari Jira</button>
            <small class="field-hint">Isi Base URL, Email &amp; API Token dulu, lalu klik untuk memuat pilihan.</small>
          </div>
          <label>Jira Story Point Field
            <select id="cfg-jira_story_point_field"></select>
            <small id="jira-fields-hint" class="field-hint"></small>
          </label>
          <label>Project / Team Jira
            <select id="cfg-jira_project"></select>
          </label>
          <label>Assignee
            <select id="cfg-jira_assignee"></select>
          </label>
          <label>Lingkup Sprint
            <select id="cfg-jira_sprint_scope">
              <option value="">Semua (sepanjang waktu)</option>
              <option value="active">Sprint aktif sekarang</option>
              <option value="backlog">Backlog (belum masuk sprint)</option>
            </select>
            <small class="field-hint">Pilih "Sprint aktif" biar cuma tiket sprint berjalan (mis. Sprint 58) yang muncul.</small>
          </label>
          <label>GitHub Token <span class="opt">(opsional)</span>
            <input type="password" id="cfg-github_token" placeholder="••••••••" />
          </label>
          <label>Gemma Model
            <select id="cfg-gemma_model"></select>
            <small id="gemma-hint" class="field-hint"></small>
          </label>
          <div class="settings-actions">
            <button type="button" id="settings-cancel" class="btn">Batal</button>
            <button type="submit" class="btn primary">Simpan</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
